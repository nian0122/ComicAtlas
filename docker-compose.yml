services:
  mysql:
    image: mysql:8.0
    container_name: comicatlas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: comic_atlas
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: comicatlas-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: comicatlas-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: comicatlas-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"

  gateway:
    build: ./gateway
    container_name: comicatlas-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NACOS_ADDR: nacos:8848
    depends_on:
      - nacos

  api-service:
    build: ./api-service
    container_name: comicatlas-api
    restart: unless-stopped
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos

  worker-service:
    build: ./worker-service
    container_name: comicatlas-worker
    restart: unless-stopped
    environment:
      NACOS_ADDR: nacos:8848
      RABBITMQ_HOST: rabbitmq
      MANGA_ROOT: /manga
    volumes:
      - ${MANGA_ROOT:-./manga}:/manga
    depends_on:
      - rabbitmq
      - nacos

  nginx:
    build: ./frontend
    container_name: comicatlas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${MANGA_ROOT:-./manga}:/manga:ro
    depends_on:
      - gateway

volumes:
  mysql-data:
